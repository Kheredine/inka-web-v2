<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inka — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0F0A07;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 320px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #FF6A00, #D94F2A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #8C6B57;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: linear-gradient(135deg, #FF6A00, #D94F2A);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      width: 100%;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">I</div>
    <h1>Pas de connexion</h1>
    <p>Inka a besoin d'une connexion internet pour charger les sons.<br>Vérifie ta connexion et réessaie.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
